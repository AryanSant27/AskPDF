<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskPDF</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="auth-container">
        <div id="login-form">
            <h2>Login</h2>
            <input type="text" id="login-username" placeholder="Username" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button onclick="login()">Login</button>
            <p>Don't have an account? <a href="#" onclick="toggleAuthForms()">Register</a></p>
        </div>
        <div id="register-form" style="display: none;">
            <h2>Register</h2>
            <input type="text" id="register-username" placeholder="Username" required>
            <input type="password" id="register-password" placeholder="Password" required>
            <button onclick="register()">Register</button>
            <p>Already have an account? <a href="#" onclick="toggleAuthForms()">Login</a></p>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <div id="pdf-management-container">
            <div id="pdf-upload-container">
                <h2>Upload PDF</h2>
                <input type="file" id="pdf-file-input" accept=".pdf">
                <button onclick="uploadPdf()">Upload</button>
            </div>
            <div id="pdf-list-container">
                <h2>Your Documents</h2>
                <ul id="pdf-list"></ul>
            </div>
        </div>
        <div id="chat-container">
            <h2 id="chat-header">Select a Document to Start Chatting</h2>
            <div id="chat-history"></div>
            <div id="chat-input">
                <input type="text" id="user-query" placeholder="Ask a question about the PDF...">
                <button onclick="askPdf()">Send</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
